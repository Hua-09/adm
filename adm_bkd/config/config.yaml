app:
  name: "adm_bkd"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 6677

log:
  level: "debug"

# 你指定的教学文件库根目录
storage:
  rootDir: "/data/teaching_repo"
  maxUploadMB: 500
  aiResultWaitSec: 120
  enableLock: true
  enableCache: true
  allowExtList:
    - pdf
    - doc
    - docx
    - xls
    - xlsx
    - png
    - jpg
    - jpeg
    - webp
    - mp4
    - mov
    - avi
    - txt
    - md

aiServer:
  apiUrl: "http://127.0.0.1:6678/api/run_model"
